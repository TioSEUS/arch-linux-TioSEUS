# === VARIÁVEIS DE AMBIENTE ===
# Baseado na wiki oficial do Hyprland 0.50.0
# https://wiki.hypr.land/Configuring/Environment-variables

# --- TOOLKIT BACKEND ---
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# --- XDG ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_MENU_PREFIX,plasma-

# --- QT ---
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct

# --- GTK THEME ---
env = GTK_THEME,Adwaita-dark

# --- CURSOR ---
env = XCURSOR_SIZE,24
env = HYCURSOR_SIZE,24

# --- XWAYLAND ---
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# === OTIMIZAÇÃO PARA JOGOS ===
# SDL_VIDEODRIVER já definido acima (wayland)

# Libera vsync pra jogos Steam/Proton (combinado com allow_tearing)
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

# PROTON/Steam (descomente se usar)
# env = PROTON_USE_WINED3D,0
# env = STEAM_COMPAT_CLIENT_INSTALL_PATH,~/.local/share/Steam
# env = STEAM_COMPAT_DATA_PATH,~/.local/share/Steam/steamapps/compatdata

# === NVIDIA (só se GPU=NVIDIA — auto-adicionado pelo install.sh) ===
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = LIBVA_DRIVER_NAME,nvidia
# env = NVD_BACKEND,direct

# === AQUAMARINE (se GPU AMD/iGPU Intel — evita flicker em multi-GPU) ===
# env = AQ_NO_MODIFIERS,1  # descomente se tiver flicker
