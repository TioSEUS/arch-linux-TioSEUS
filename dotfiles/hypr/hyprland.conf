### 📄 2. `dotfiles/hypr/wallpaper.sh` (corrigido — sem hyprctl hyprpaper)

```bash
#!/bin/bash

# Finaliza instâncias antigas
killall hyprpaper 2>/dev/null
sleep 1

WALL_DIR="$HOME/Pictures/Wallpapers"
CONF="$HOME/.config/hyprpaper/hyprpaper.conf"

# Garante que o diretório existe
mkdir -p "$WALL_DIR"

# Inicia com configuração
if [ -f "$CONF" ]; then
    hyprpaper -c "$CONF" >/dev/null 2>&1 &
    echo "[INFO] hyprpaper iniciado com config: $CONF"
else
    hyprpaper >/dev/null 2>&1 &
    echo "[INFO] hyprpaper iniciado sem config (vai usar defaults)"
fi

echo "[OK] Wallpaper inicial configurado!"bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Navegação circular de workspaces (substitui os binds de mouse inválidos)
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d-%H%M%S_screenshot.png')

# Windowrules com sintaxe correta do Hyprland
windowrule = float, class:^(mpv)$ windowrule = center, class:^(mpv)$ windowrule = size 1920 1080, class:^(mpv)$ ```

