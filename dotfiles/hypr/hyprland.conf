
####################################################
############# HYPRLAND CONFIG ######################
################ BY TioSEUS ########################
####################################################

# --- CORREÇÃO DO CEDILHA (Ç) ---
env = GTK_IM_MODULE,cedilla
env = QT_IM_MODULE,cedilla

# --- VARIÁVEIS DE AMBIENTE ---
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME,Adwaita-dark

# --- MONITORES ---
monitor = HDMI-A-1, 1600x900@75, 0x100, 1
monitor = DP-3, 2560x1440@165, 1600x0, 1

# --- AUTOSTART ---
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = blueman-applet
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = waybar
exec-once = swaync
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# --- TECLADO E MOUSE ---
input {
    kb_layout = us
    kb_variant = intl
    kb_model = pc105
    follow_mouse = 1
    sensitivity = 0 
    accel_profile = flat # Desativa aceleração de mouse (essencial para precisão em jogos)
}

# --- VISUAL ---
general {
    gaps_in = 4          
    gaps_out = 10        
    border_size = 2      
    col.active_border = rgba(005699ee) rgba(007accff) 45deg
    col.inactive_border = rgba(0a0e14aa)
    layout = dwindle
    allow_tearing = true # Permite Tearing para reduzir latência de input em jogos se ativo
}

decoration {
    rounding = 12        
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true # Otimização de renderização do Blur
    }
}

# --- OTIMIZAÇÕES DE DESEMPENHO ---
misc {
    force_default_wallpaper = 0     # Desativa o wallpaper padrão vermelho do Hyprland para poupar RAM
    disable_hyprland_logo = true    # Remove a logo da memória
    disable_splash_rendering = true # Desativa telas de splash
    #vrr = 1                         # Adaptive Sync / Freesync ativo para monitores compatíveis (reduz stuttering)
    mouse_move_enables_dpms = true  # Acorda o monitor ao mexer o mouse
}

# --- CONFIGURAÇÃO DE LAYOUT (DWINDLE) ---
dwindle {
    force_split = 0 
    preserve_split = true # Mantém a mesma divisão ao mover janelas
}

# --- ATALHOS DE TECLADO (BINDS) ---
$mainMod = SUPER
$terminal = ghostty

# Gerenciamento Geral
bind = $mainMod, Q, killactive                                      # Fechar Janela ativa
bind = $mainMod, T, exec, $terminal                                 # Abrir Terminal Ghostty
bind = $mainMod, E, exec, $terminal --class=spf -e spf              # Gerenciador de Arquivos SPF no Ghostty
bind = $mainMod, D, exec, rofi -show drun -theme ~/.config/rofi/config.rasi             # Menu Rofi
bind = $mainMod, F, togglefloating,                                 # Tornar a janela flutuante
bind = $mainMod, M, fullscreen,                                     # Janela em tela cheia

# Foco de Janela (Mover o cursor entre janelas com as setas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover Janelas Abertas (Mudar a posição da janela ativa com as setas)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Mudar de Área de Trabalho (Workspace 1 a 5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Enviar Janela Ativa para outra Área de Trabalho (Move a janela aberta)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Navegar pelos Workspaces usando o Scroll do Mouse sobre a tela
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover/Redimensionar janelas flutuantes com o Mouse (SUPER + Clique Esquerdo/Direito)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- COPIAR/COLAR E CAPTURA DE TELA ---
# Atalho estilo Windows (SUPER + SHIFT + S) para tirar print de uma área e salvar em Imagens
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Imagens/$(date +'%Y-%m-%d-%H%M%S_screenshot.png')

# --- REGRAS DE JANELAS (SINTAXE ATUAL DA WIKI - SEM V2 E COM TIPAGEM ESTRITA) ---

# Performance máxima em jogos da Steam (immediate precisa do valor 1)
windowrule = match:class ^(steam_app_.*)$, immediate 1

# Forçar janelas secundárias a flutuarem (float precisa do valor 1)
windowrule = match:title ^(Friends List)$, float 1
windowrule = match:title ^(Settings)$, float 1
windowrule = match:class ^(heroic)$ match:title ^(Settings)$, float 1

# Fazer o MPV abrir flutuante e centralizado
windowrule = match:class ^(mpv)$, float 1
windowrule = match:class ^(mpv)$, center 1
windowrule = match:class ^(mpv)$, size 1920 1080
