####################################################
############# HYPRLAND CONFIG ######################
################ BY TioSEUS ########################
####################################################

# --- VARIÁVEIS DE AMBIENTE ---
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_THEME,Adwaita-dark
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx

# --- MONITORES ---
monitor = HDMI-A-1, 1600x900@75, 0x100, 1
monitor = DP-3, 2560x1440@165, 1600x0, 1

# --- AUTOSTART ---
exec-once = fcitx5 -d
exec-once = gnome-keyring-daemon --start --components=secrets
#exec-once = nm-applet --indicator
#exec-once = blueman-applet
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = waybar
exec-once = swaync
exec-once = darkman run
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# --- TECLADO E MOUSE ---
input {
    kb_layout = us
    kb_variant = intl
    kb_model = pc104
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

# --- VISUAL ---
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(005699ee) rgba(007accff) 45deg
    col.inactive_border = rgba(0a0e14aa)
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 12

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
}

dwindle {
    force_split = 0
    preserve_split = true
}

 $mainMod = SUPER
 $terminal = kitty

bind = $mainMod, Q, killactive
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $terminal -e spf

# === KEYBINDS ROFI ===
bind = $mainMod, D, exec, ~/.config/rofi/launchers/type-3/launcher.sh
bind = $mainMod SHIFT, P, exec, ~/.config/rofi/powermenu/type-4/powermenu.sh
bind = $mainMod SHIFT, W, exec, ~/.config/rofi/rofi-wifi-menu.sh

bind = $mainMod, F, togglefloating
bind = $mainMod, M, fullscreen

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Navegação circular de workspaces
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d-%H%M%S_screenshot.png')

# Windowrules (sintaxe v2 — Hyprland 0.40+)
windowrulev2 = float, class:^(mpv)$ windowrulev2 = center, class:^(mpv)$ windowrulev2 = size 1920 1080, class:^(mpv)$ ```

