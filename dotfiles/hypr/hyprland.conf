source = ~/.config/hypr/hyprenv.conf
source = ~/.config/hypr/userconf.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/window.conf
source = ~/.config/hypr/keybinds.conf

monitor = HDMI-A-1, 1600x900@75, 0x100, 1
monitor = DP-3, 2560x1440@165, 1600x0, 1

general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(005699ee) rgba(007accff) 45deg
    col.inactive_border = rgba(0a0e14aa)
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 12
    blur { enabled = true; size = 6; passes = 3; new_optimizations = true }
}

dwindle { force_split = 0; preserve_split = true }
