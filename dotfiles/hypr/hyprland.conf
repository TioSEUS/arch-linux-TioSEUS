## 📄 4. `dotfiles/hypr/wallpaper.sh`

**Mudanças:**
- Removido o `hyprctl hyprpaper preload/wallpaper` (não existe)
- Agora apenas reinicia o hyprpaper deixando-o ler o `hyprpaper.conf`

```bash
#!/bin/bash

# Finaliza instâncias antigas
killall hyprpaper 2>/dev/null
sleep 1

WALL_DIR="$HOME/Pictures/Wallpapers"
CONF="$HOME/.config/hyprpaper/hyprpaper.conf"

# Garante que o diretório existe
mkdir -p "$WALL_DIR"

# Inicia com configuração
if [ -f "$CONF" ]; then
    hyprpaper -c "$CONF" >/dev/null 2>&1 &
    echo "[INFO] hyprpaper iniciado com config: $CONF"
else
    hyprpaper >/dev/null 2>&1 &
    echo "[INFO] hyprpaper iniciado sem config (vai usar defaults)"
fi

echo "[OK] Wallpaper inicial configurado!"bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d-%H%M%S_screenshot.png')

windowrule = match:class ^(mpv)$, float 1
windowrule = match:class ^(mpv)$, center 1
windowrule = match:class ^(mpv)$, size 1920 1080
