# === REGRA DE WORKSPACES POR MONITOR ===
# Workspace 1-5 no monitor principal (DP-3)
# Workspace 6-10 no monitor secundário (HDMI-A-1)

workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3

workspace = 6, monitor:HDMI-A-1, default:true
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

# === SPECIAL WORKSPACE (scratchpad) ===
# Super+Shift+S move janela pro scratchpad
# Super+S abre/fecha o scratchpad
workspace = special:magic, on-created-empty:hyprctl dispatch layoutmsg orientationcycle

# === REGRAS DE WORKSPACE ===
# Aplica gaps especiais quando só tem 1 janela (sem gaps)
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
