# === WINDOW RULES ===
# Sintaxe nova (Hyprland 0.46+) â€” blocos windowrule { ... }

# ============ APPS ESPECĂŤFICOS ============

# MPV como player flutuante
windowrule {
    name = mpv_float
    match:class = ^mpv$     float = true
}
windowrule {
    name = mpv_center
    match:class = ^mpv$     center = true
}
windowrule {
    name = mpv_size
    match:class = ^mpv$     size = 1920 1080
}

# File pickers em float
windowrule {
    name = portal_float
    match:class = ^xdg-desktop-portal-gtk$     float = true
}
windowrule {
    name = portal_size
    match:class = ^xdg-desktop-portal-gtk$     size = 800 600
}

# Pavucontrol em float
windowrule {
    name = pavu_float
    match:class = ^pavucontrol$     float = true
}
windowrule {
    name = pavu_size
    match:class = ^pavucontrol$     size = 800 600
}

# Calculadora em float
windowrule {
    name = qalculate_float
    match:class = ^qalculate-gtk$     float = true
}

# Blueman-manager em float
windowrule {
    name = blueman_float
    match:class = ^blueman-manager$     float = true
}
windowrule {
    name = blueman_size
    match:class = ^blueman-manager$     size = 600 500
}

# ============ JOGOS STEAM / PROTON ============

windowrule {
    name = steam_games_fullscreen
    match:class = ^steam_app_.*$     fullscreen = true
}
windowrule {
    name = steam_games_immediate
    match:class = ^steam_app_.*$     immediate = true
}
windowrule {
    name = steam_games_noblur
    match:class = ^steam_app_.*$     noblur = true
}

windowrule {
    name = steam_ws1
    match:class = ^steam$     workspace = 1 silent
}
windowrule {
    name = steam_friends_float
    match:class = ^steam$     match:title = ^Friends List$     float = true
}
windowrule {
    name = steam_screenshot_float
    match:class = ^steam$     match:title = ^Screenshot$     float = true
}

# ============ OUTROS LAUNCHERS ============

windowrule {
    name = lutris_ws1
    match:class = ^lutris$     workspace = 1 silent
}
windowrule {
    name = lutris_fullscreen
    match:class = ^lutris$     match:title = ^Lutris$     fullscreen = true
}

windowrule {
    name = heroic_ws5
    match:class = ^com.heroicgameslauncher.hgl$     workspace = 5 silent
}

# ============ JOGOS NATIVOS ============

windowrule {
    name = cs2_fullscreen
    match:class = ^cs2$     fullscreen = true
}
windowrule {
    name = cs2_immediate
    match:class = ^cs2$     immediate = true
}
windowrule {
    name = cs2_noblur
    match:class = ^cs2$     noblur = true
}

windowrule {
    name = minecraft_fullscreen
    match:class = ^Minecraft$     fullscreen = true
}
windowrule {
    name = minecraft_immediate
    match:class = ^Minecraft$     immediate = true
}

windowrule {
    name = valorant_fullscreen
    match:class = ^valorant.exe$     fullscreen = true
}
windowrule {
    name = valorant_immediate
    match:class = ^valorant.exe$     immediate = true
}

windowrule {
    name = dota2_fullscreen
    match:class = ^dota2$     fullscreen = true
}
windowrule {
    name = dota2_immediate
    match:class = ^dota2$     immediate = true
}

# ============ APPS EM WORKSPACES ESPECĂŤFICOS ============

windowrule {
    name = discord_ws2
    match:class = ^discord$     workspace = 2 silent
}
windowrule {
    name = vesktop_ws2
    match:class = ^Vesktop$     workspace = 2 silent
}
windowrule {
    name = webcord_ws2
    match:class = ^WebCord$     workspace = 2 silent
}

windowrule {
    name = obs_ws4
    match:class = ^com.obsproject.Studio$     workspace = 4 silent
}

windowrule {
    name = code_ws1
    match:class = ^code$     workspace = 1 silent
}
windowrule {
    name = code_url_ws1
    match:class = ^code-url-handler$     workspace = 1 silent
}

# ============ OPACITY ============

windowrule {
    name = kitty_opacity
    match:class = ^kitty$     opacity = 0.9
}
windowrule {
    name = code_opacity
    match:class = ^code$     opacity = 0.95
}
windowrule {
    name = discord_opacity
    match:class = ^discord$     opacity = 0.9
}
