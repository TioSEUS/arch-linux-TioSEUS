# === WINDOW RULES ===
# Sintaxe v2 (Hyprland 0.40+)

# ============ APPS ESPECÍFICAS ============

# MPV como player flutuante
windowrulev2 = float, class:^(mpv)$ windowrulev2 = center, class:^(mpv)$ windowrulev2 = size 1920 1080, class:^(mpv)$ 
# File pickers em float
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$ windowrulev2 = size 800 600, class:^(xdg-desktop-portal-gtk)$ 
# Pavucontrol em float
windowrulev2 = float, class:^(pavucontrol)$ windowrulev2 = size 800 600, class:^(pavucontrol)$ 
# Calculadora em float
windowrulev2 = float, class:^(qalculate-gtk)$ 
# Blueman-manager em float
windowrulev2 = float, class:^(blueman-manager)$ windowrulev2 = size 600 500, class:^(blueman-manager)$ 
# ============ JOGOS STEAM / PROTON (OTIMIZADO) ============

# Steam Games (steam_app_*) — abre em fullscreen + tearing + sem blur
windowrulev2 = fullscreen, class:^(steam_app_.*)$ windowrulev2 = immediate, class:^(steam_app_.*)$ windowrulev2 = noblur, class:^(steam_app_.*)$ 
# Steam UI
windowrulev2 = workspace 1 silent, class:^(steam)$ windowrulev2 = float, class:^(steam)$,title:^(Friends List)$ windowrulev2 = float, class:^(steam)$,title:^(Screenshot)$ 
# ============ OUTROS LAUNCHERS ============

# Lutris
windowrulev2 = workspace 1 silent, class:^(lutris)$ windowrulev2 = fullscreen, class:^(lutris)$,title:^(Lutris)$ 
# Heroic
windowrulev2 = workspace 5 silent, class:^(com.heroicgameslauncher.hgl)$ 
# ============ JOGOS NATIVOS (adicione os seus) ============

# CS2 / CS:GO
windowrulev2 = fullscreen, class:^(cs2)$ windowrulev2 = immediate, class:^(cs2)$ windowrulev2 = noblur, class:^(cs2)$ 
# Minecraft
windowrulev2 = fullscreen, class:^(Minecraft)$ windowrulev2 = immediate, class:^(Minecraft)$ 
# Valorant (via wine)
windowrulev2 = fullscreen, class:^(valorant.exe)$ windowrulev2 = immediate, class:^(valorant.exe)$ 
# Dota 2
windowrulev2 = fullscreen, class:^(dota2)$ windowrulev2 = immediate, class:^(dota2)$ 
# ============ APPS EM WORKSPACES ESPECÍFICOS ============

# Discord/Vesktop no workspace 2
windowrulev2 = workspace 2 silent, class:^(discord)$ windowrulev2 = workspace 2 silent, class:^(Vesktop)$ windowrulev2 = workspace 2 silent, class:^(WebCord)$ 
# OBS no workspace 4
windowrulev2 = workspace 4 silent, class:^(com.obsproject.Studio)$ 
# Code no workspace 1
windowrulev2 = workspace 1 silent, class:^(code)$ windowrulev2 = workspace 1 silent, class:^(code-url-handler)$ 
# ============ IGNORE MAXIMIZE REQUESTS ============

# Apps que tentam maximizar mas não devem
windowrulev2 = suppressevent maximize, class:.*

# ============ OPACITY / INACTIVE ============

# Diminui opacidade de apps inativos específicos
windowrulev2 = opacity 0.9, class:^(kitty)$ windowrulev2 = opacity 0.95, class:^(code)$ windowrulev2 = opacity 0.9, class:^(discord)$ 
# ============ PINNED APPS ============

# Apps que sempre ficam no topo (sticky)
# windowrulev2 = pin, class:^(pavucontrol)$
