# --- TECLADO E MOUSE NATIVO (Sem fcitx) ---
input {
    kb_layout = us
    kb_variant = intl             # Configura nativamente os acentos normais (~ + a = ã)
    kb_model = pc104
    kb_options =                  
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true   
    vfr = true                    # Otimização da Wiki: reduz o uso de GPU em idle
}
