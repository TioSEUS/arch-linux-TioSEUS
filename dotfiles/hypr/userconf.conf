# ==========================================================
# INPUT & TWEAKS DE PERFORMANCE
# ==========================================================

input {
    kb_layout = us
    kb_variant = intl 
    kb_model = pc104
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

misc {
    # Tweaks de Performance recomendados pela Wiki
    vfr = true                 # Economiza bateria/recursos quando a tela está parada
    vrr = 1                    # Habilita Variable Refresh Rate (FreeSync/G-Sync) nas telas compatíveis

    # Limpeza visual
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true   
}
