# === INPUT ===
input {
    kb_layout = us
    kb_variant = intl
    kb_model = pc104
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    # Touchpad (se for laptop)
    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# === GESTOS (se touchscreen/touchpad) ===
gestures {
    workspace_swipe = true
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# === GENERAL ===
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(005699ee) rgba(007accff) 45deg
    col.inactive_border = rgba(0a0e14aa)
    layout = dwindle
    allow_tearing = true          # ← chave pra jogos com tearing
    resize_on_border = true
}

# === DECORATION ===
decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true                 # blur mais performático
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(007accee)
        color_inactive = rgba(0a0e14aa)
    }
}

# === ANIMAÇÕES (curvas suaves da wiki) ===
animations {
    enabled = true

    # Beziers (curvas de animação)
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = linear, 1, 1, 1, 1
    bezier = easeInOutSine, 0.37, 0, 0.63, 1
    bezier = easeOutSine, 0.61, 1, 0.88, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    # Animações
    animation = windowsIn, 1, 3, easeInOutSine, popin
    animation = windowsOut, 1, 3, easeInOutSine, popin
    animation = border, 1, 3, easeInOutSine
    animation = borderangle, 1, 30, easeInOutSine, loop
    animation = workspacesIn, 1, 3, easeInOutSine, slidefade
    animation = workspacesOut, 1, 3, easeInOutSine, slidefade
    animation = specialWorkspaceIn, 1, 3, easeInOutSine, slidevert
    animation = specialWorkspaceOut, 1, 3, easeInOutSine, slidevert
    animation = layersIn, 1, 3, easeInOutSine, fade
    animation = layersOut, 1, 3, easeInOutSine, fade
}

# === DWINDLE LAYOUT ===
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 0
    special_scale_factor = 0.8
}

# === MASTER LAYOUT (alternativo) ===
master {
    new_status = master
    new_on_top = true
}

# === MISC ===
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    # VRR (Variable Refresh Rate)
    # 0 = off, 1 = always, 2 = fullscreen, 3 = fullscreen+game-only
    vrr = 3                        # ← evita flicker no desktop, ativa em jogos

    # Render
    render_ahead_of_time = false
    render_ahead_safezone = 1

    # Focus
    focus_on_activate = true
    mouse_move_focuses_monitor = true

    # Anime mudanças de workspace
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}
