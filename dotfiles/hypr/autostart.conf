# ==========================================================
# AUTOSTART (Serviços e Daemons)
# ==========================================================

# Finaliza qualquer instância anterior dos portais (Garante que a tela grave/compartilhe direito)
exec-once = killall xdg-desktop-portal-hyprland
exec-once = killall xdg-desktop-portal

# Inicia os portais com um pequeno delay
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &

# Agente de Autenticação (A janelinha que pede senha de root)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Daemons de credenciais e temas
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = darkman run

# Interface de Usuário
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = waybar
exec-once = swaync
