# === AUTOSTART ===

# --- DBUS / SYSTEMD ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start graphical-session.target

# === AUTO-CONFIG DE MONITORES (roda no boot) ===
# Detecta monitores e gera monitors.conf + hyprpaper.conf dinamicamente
exec-once = ~/.config/hypr/scripts/auto-config-monitors.sh

# --- WALLPAPER ---
exec-once = ~/.config/hypr/wallpaper.sh

# --- BAR / NOTIFICATIONS / DARKMAN ---
exec-once = waybar
exec-once = swaync
exec-once = darkman run

# --- POLKIT / AUTH ---
exec-once = systemctl --user start hyprpolkitagent

# --- KEYRING ---
exec-once = gnome-keyring-daemon --start --components=secrets

# --- WALLPAPER ---
exec-once = ~/.config/hypr/wallpaper.sh

# --- BAR / NOTIFICATIONS / DARKMAN ---
exec-once = waybar
exec-once = swaync
exec-once = darkman run

# --- CLIPBOARD ---
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- CURSOR ---
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# === FIX XDG-DESKTOP-PORTAL (file picker não abre sem isso) ===
exec-once = killall xdg-desktop-portal-hyprland
exec-once = killall xdg-desktop-portal
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &

# === OPTIONAL: AUTO-APPLY WALLUST (se usar) ===
# exec-once = wallust run -s ~/.config/rofi/.current_wallpaper 2>/dev/null
