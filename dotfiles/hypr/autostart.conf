# === AUTOSTART ===

# --- DBUS / SYSTEMD (PRIMEIRO! Sem isso nada funciona) ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start graphical-session.target

# --- POLKIT / KEYRING ---
exec-once = systemctl --user start hyprpolkitagent
exec-once = gnome-keyring-daemon --start --components=secrets

# --- WALLPAPER (swww) ---
exec-once = ~/.config/hypr/wallpaper.sh

# --- DETECTA NOTEBOOK VS DESKTOP PRA WAYBAR ---
exec-once = ~/.config/hypr/scripts/waybar-mode.sh

# --- BAR / NOTIFICATIONS / DARKMAN ---
exec-once = waybar
exec-once = swaync
exec-once = darkman run

# --- CLIPBOARD ---
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- CURSOR ---
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# === FIX XDG-DESKTOP-PORTAL ===
exec-once = killall xdg-desktop-portal-hyprland
exec-once = killall xdg-desktop-portal
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &exec-once = killall xdg-desktop-portal-hyprland
exec-once = killall xdg-desktop-portal
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &

# === OPTIONAL: AUTO-APPLY WALLUST (se usar) ===
# exec-once = wallust run -s ~/.config/rofi/.current_wallpaper 2>/dev/null
